<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebLog Security Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <div>
        <h1>🔍 WebLog Security Dashboard</h1>
        <p class="subtitle">Monitor suspicious IP activity from analyzed web logs.</p>
      </div>
      
    </header>

    <section class="stats">
      <div class="card"><h3>Total Logs</h3><p id="totalLogs">0</p></div>
      <div class="card"><h3>Unique IPs</h3><p id="uniqueIps">0</p></div>
      <div class="card"><h3>High Risk IPs</h3><p id="highRiskIps">0</p></div>
      <div class="card"><h3>Suspicious Logs</h3><p id="suspiciousLogs">0</p></div>
    </section>

    <section class="table-section">
      <h2>IP Risk Table</h2>
      <div class="table-wrapper">
        <table id="riskTable">
          <thead>
            <tr>
              <th>IP Address</th>
              <th>Requests</th>
              <th>Risk Score</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
        <p id="emptyMessage" class="empty-msg" style="display:none;">No log data found.</p>
      </div>
    </section>
  </div>

  <div id="modal" class="modal">
    <div class="modal-box">
      <span id="closeModal" class="close">&times;</span>
      <h2 id="modalTitle">IP Details</h2>
      <div id="modalBody"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
